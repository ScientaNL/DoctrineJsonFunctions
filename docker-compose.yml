services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: doctrine-json-php
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mssql:
        condition: service_healthy
    environment:
      MYSQL_URL: "mysql://root:root@mysql:3306/doctrine_json_test"
      MARIADB_URL: "mysql://root:root@mariadb:3306/doctrine_json_test"
      POSTGRES_URL: "pgsql://postgres:postgres@postgres:5432/doctrine_json_test"
      MSSQL_URL: "sqlsrv://SA:YourStrong!Passw0rd@mssql:1433"
    command: tail -f /dev/null

  mysql:
    image: mysql:8
    container_name: doctrine-json-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctrine_json_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11
    container_name: doctrine-json-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: doctrine_json_test
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: doctrine-json-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doctrine_json_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: doctrine-json-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U SA -P 'YourStrong!Passw0rd' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
