services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: doctrine-json-php
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      MYSQL_URL: "mysql://root:root@mysql:3306/doctrine_json_test"
      MARIADB_URL: "mysql://root:root@mariadb:3306/doctrine_json_test"
      POSTGRES_URL: "pgsql://postgres:postgres@postgres:5432/doctrine_json_test"
    command: tail -f /dev/null

  mysql:
    image: mysql:8
    container_name: doctrine-json-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctrine_json_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11
    container_name: doctrine-json-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: doctrine_json_test
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: doctrine-json-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doctrine_json_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
