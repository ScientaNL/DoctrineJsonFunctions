name: CI

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"
        dependencies:
          - "highest"
        include:
          - dependencies: "lowest"
            php-version: "8.1"

    steps:
      - uses: actions/checkout@v4

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          tools: pecl, cs2pr
          extensions: opcache, pcntl, pdo_mysql, zip

      - name: "Install dependencies with Composer"
        uses: "ramsey/composer-install@v2"
        with:
          dependency-versions: "${{ matrix.dependencies }}"

      - name: Run phpunit
        run: composer test:unit

  integration:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: doctrine_json_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: doctrine_json_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doctrine_json_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U SA -P 'YourStrong!Passw0rd' -No -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s

    env:
      MYSQL_URL: "mysql://root:root@127.0.0.1:3306/doctrine_json_test"
      MARIADB_URL: "mysql://root:root@127.0.0.1:3307/doctrine_json_test"
      POSTGRES_URL: "pgsql://postgres:postgres@127.0.0.1:5432/doctrine_json_test"
      MSSQL_URL: "sqlsrv://SA:YourStrong!Passw0rd@127.0.0.1:1433"

    steps:
      - uses: actions/checkout@v4

      - name: Install Microsoft ODBC Driver for SQL Server
        run: |
          sudo apt-get update
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18 unixodbc-dev

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer
          extensions: opcache, pdo_mysql, pdo_pgsql, pdo_sqlite, pdo_sqlsrv, zip

      - name: "Install dependencies with Composer"
        uses: "ramsey/composer-install@v2"
        with:
          dependency-versions: "highest"

      - name: Run integration tests
        run: composer test:integration

  phpcs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer, cs2pr
          extensions: opcache, pcntl, pdo_mysql, zip

      - name: Install php packages
        run: composer install

      - name: Run phpcs
        run: ./vendor/bin/phpcs -q --report=checkstyle | tee -a /dev/stderr | cs2pr

  psalm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer, cs2pr
          extensions: opcache, pcntl, pdo_mysql, zip

      - name: Install php packages
        run: composer install

      - name: Run psalm
        run: ./vendor/bin/psalm

  phpstan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer, cs2pr
          extensions: opcache, pcntl, pdo_mysql, zip

      - name: Install php packages
        run: composer install

      - name: Run phpstan
        run: ./vendor/bin/phpstan
