name: Coverage Comment

on:
  workflow_run:
    workflows: ["Coverage"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest

    # Only run when triggered by a pull_request event and the coverage workflow succeeded
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write  # post PR comments

    steps:
      - name: Download coverage data artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs       = require('fs');
            const current  = parseFloat(fs.readFileSync('pct.txt',      'utf8').trim());
            const prNumber = parseInt(  fs.readFileSync('pr-number.txt', 'utf8').trim(), 10);
            const baseRef  =            fs.readFileSync('base-ref.txt',  'utf8').trim();

            const url = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/badges/coverage.txt`;
            let baseline      = 0;
            let baselineFound = false;
            try {
              const resp = await fetch(url);
              if (resp.ok) {
                baseline      = parseFloat(await resp.text());
                baselineFound = true;
              }
            } catch (_) {}

            const delta    = current - baseline;
            const sign     = delta >= 0 ? '+' : '';
            const deltaStr = baselineFound ? `${sign}${delta.toFixed(1)}%` : 'n/a (no baseline yet)';
            const ok       = !baselineFound || current >= baseline - 1.0;

            const body = [
              '<!-- coverage-report -->',
              '## Coverage Report',
              '',
              '| | |',
              '|---|---|',
              `| Coverage | **${current}%** |`,
              `| Change vs \`${baseRef}\` | ${deltaStr} ${ok ? '✅' : '❌'} |`,
              '',
              ok ? '' : `> ⚠️ Coverage dropped from ${baseline}% to ${current}%. Please add tests for the changed code.`,
            ].join('\n').trimEnd();

            const marker = '<!-- coverage-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body,
              });
            }
