name: Coverage Comment

on:
  workflow_run:
    workflows: ["Coverage"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest

    # Run when triggered by a pull_request event, regardless of success or failure
    # (failure can mean integration tests failed but unit data is still available)
    if: github.event.workflow_run.event == 'pull_request' && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure')

    permissions:
      pull-requests: write  # post PR comments

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage data artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.github/scripts/coverage-comment.js');
            await fn({ github, context, require });
