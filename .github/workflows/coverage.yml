name: Coverage

on:
  push:
    branches: [master]
  pull_request:

jobs:
  report-unit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      pct:   ${{ steps.cov.outputs.pct }}
      color: ${{ steps.cov.outputs.color }}

    steps:
      - uses: actions/checkout@v4

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer
          extensions: opcache, pdo_mysql, zip, pcov

      - name: Install dependencies
        uses: ramsey/composer-install@v2
        with:
          dependency-versions: "highest"

      - name: Generate coverage report
        run: composer test:coverage

      - name: Report coverage
        id: cov
        uses: ./.github/actions/report-coverage
        with:
          xml-file: coverage.xml
          badge-file: coverage.txt
          artifact-name: coverage-data-unit
          pct-filename: pct.txt
          label: Coverage
          include-pr-metadata: 'true'

  report-integration:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: doctrine_json_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: doctrine_json_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doctrine_json_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U SA -P 'YourStrong!Passw0rd' -No -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s

    env:
      MYSQL_URL: "mysql://root:root@127.0.0.1:3306/doctrine_json_test"
      MARIADB_URL: "mysql://root:root@127.0.0.1:3307/doctrine_json_test"
      POSTGRES_URL: "pgsql://postgres:postgres@127.0.0.1:5432/doctrine_json_test"
      MSSQL_URL: "sqlsrv://SA:YourStrong!Passw0rd@127.0.0.1:1433"

    permissions:
      contents: read

    outputs:
      pct:   ${{ steps.cov.outputs.pct }}
      color: ${{ steps.cov.outputs.color }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Microsoft ODBC Driver for SQL Server
        run: |
          sudo apt-get update
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18 unixodbc-dev

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer
          extensions: opcache, pdo_mysql, pdo_pgsql, pdo_sqlite, pdo_sqlsrv, zip, pcov

      - name: Install dependencies
        uses: ramsey/composer-install@v2
        with:
          dependency-versions: "highest"

      - name: Generate integration coverage report
        run: composer test:coverage:integration

      - name: Report coverage
        id: cov
        uses: ./.github/actions/report-coverage
        with:
          xml-file: coverage-integration.xml
          badge-file: coverage-integration.txt
          artifact-name: coverage-data-integration
          pct-filename: pct-integration.txt
          label: Integration coverage

  combine:
    runs-on: ubuntu-latest
    needs: [report-unit, report-integration]
    if: always() && github.event_name == 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Download unit coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-unit
          path: coverage-data/

      - name: Download integration coverage data
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-integration
          path: coverage-data/

      - name: Upload combined coverage data artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage-data/
          retention-days: 1

  badges:
    runs-on: ubuntu-latest
    needs: [report-unit, report-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: write  # push to badges branch

    steps:
      - uses: actions/checkout@v4

      - name: Update badges branch
        run: |
          pct="${{ needs.report-unit.outputs.pct }}"
          color="${{ needs.report-unit.outputs.color }}"
          pct_int="${{ needs.report-integration.outputs.pct }}"
          color_int="${{ needs.report-integration.outputs.color }}"

          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' \
            "$pct" "$color" > /tmp/coverage.json
          echo "$pct" > /tmp/coverage.txt

          printf '{"schemaVersion":1,"label":"integration coverage","message":"%s%%","color":"%s"}' \
            "$pct_int" "$color_int" > /tmp/coverage-integration.json
          echo "$pct_int" > /tmp/coverage-integration.txt

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin badges; then
            git fetch origin badges
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet
          fi

          cp /tmp/coverage.json              ./coverage.json
          cp /tmp/coverage.txt               ./coverage.txt
          cp /tmp/coverage-integration.json  ./coverage-integration.json
          cp /tmp/coverage-integration.txt   ./coverage-integration.txt
          git add coverage.json coverage.txt coverage-integration.json coverage-integration.txt
          git diff --staged --quiet || git commit -m "Update coverage to unit:${pct}% integration:${pct_int}%"
          git push origin badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
