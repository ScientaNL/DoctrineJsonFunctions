name: Coverage

on:
  push:
    branches: [master]
  pull_request:

jobs:
  report:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # no write access needed for tests or artifact upload

    outputs:
      pct:   ${{ steps.cov.outputs.pct }}
      color: ${{ steps.cov.outputs.color }}

    steps:
      - uses: actions/checkout@v4

      - name: Add php extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: pecl, composer
          extensions: opcache, pdo_mysql, zip, pcov

      - name: Install dependencies
        uses: ramsey/composer-install@v2
        with:
          dependency-versions: "highest"

      - name: Generate coverage report
        run: composer test:coverage

      - name: Parse coverage percentage
        id: cov
        run: |
          pct=$(php -r "
            if (!file_exists('coverage.xml')) {
              fprintf(STDERR, \"coverage.xml not found — did PHPUnit exit early?\n\");
              exit(1);
            }
            \$xml = simplexml_load_file('coverage.xml');
            if (\$xml === false) {
              fprintf(STDERR, \"coverage.xml could not be parsed\n\");
              exit(1);
            }
            \$m       = \$xml->project->metrics;
            \$total   = (int)\$m['statements'];
            \$covered = (int)\$m['coveredstatements'];
            echo \$total > 0 ? number_format(\$covered / \$total * 100, 1) : '0.0';
          ")
          color=$(php -r "
            \$p = (float)'$pct';
            echo \$p >= 90 ? 'brightgreen' : (\$p >= 80 ? 'green' : (\$p >= 60 ? 'yellow' : 'red'));
          ")
          echo "pct=$pct"     >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Fetch baseline from badges branch
        id: baseline
        run: |
          url="https://raw.githubusercontent.com/${{ github.repository }}/badges/coverage.txt"
          val=$(curl -sf "$url" || true)
          if [ -n "$val" ]; then
            echo "pct=$val"   >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "pct=0"       >> "$GITHUB_OUTPUT"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save coverage data for comment workflow
        if: github.event_name == 'pull_request'
        run: |
          mkdir coverage-data
          echo "${{ steps.cov.outputs.pct }}"                    > coverage-data/pct.txt
          echo "${{ github.event.pull_request.number }}"         > coverage-data/pr-number.txt
          echo "${{ github.base_ref }}"                          > coverage-data/base-ref.txt

      - name: Upload coverage data artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage-data/
          retention-days: 1

      - name: Fail if coverage decreased
        if: github.event_name == 'pull_request' && steps.baseline.outputs.found == 'true'
        run: |
          php -r "
            \$current  = (float)'${{ steps.cov.outputs.pct }}';
            \$baseline = (float)'${{ steps.baseline.outputs.pct }}';
            if (\$current < \$baseline - 1.0) {
              fprintf(STDERR, \"Coverage decreased from %.1f%% to %.1f%%\n\", \$baseline, \$current);
              exit(1);
            }
            printf(\"Coverage: %.1f%% (baseline: %.1f%%)\n\", \$current, \$baseline);
          "

  badges:
    runs-on: ubuntu-latest
    needs: report
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: write  # push to badges branch

    steps:
      - uses: actions/checkout@v4

      - name: Update badges branch
        run: |
          pct="${{ needs.report.outputs.pct }}"
          color="${{ needs.report.outputs.color }}"

          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' \
            "$pct" "$color" > /tmp/coverage.json
          echo "$pct" > /tmp/coverage.txt

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin badges; then
            git fetch origin badges
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet
          fi

          cp /tmp/coverage.json ./coverage.json
          cp /tmp/coverage.txt  ./coverage.txt
          git add coverage.json coverage.txt
          git diff --staged --quiet || git commit -m "Update coverage to ${pct}%"
          git push origin badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
